# Sovereign Constitutional Audit | Version 4.1.0
name: 🏗️ Sovereign Registry Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛡️ Audit Constitutional Integrity
        run: npx tsx scripts/validate-registry.ts

      - name: 🔍 Audit Schema Drift
        run: npm run check:schema
