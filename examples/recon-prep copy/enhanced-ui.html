<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolocation Safe Demo</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #020617;
            --border-subtle: rgba(148, 163, 184, 0.4);
            --border-strong: rgba(52, 211, 153, 0.9);
            --accent: #34d399;
            --accent-soft: rgba(52, 211, 153, 0.12);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --radius: 10px;
            --line-thin: 1px;
            --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco,
                Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.75rem;
            background: radial-gradient(circle at top left, #020617, #020617 45%, #000 100%);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .shell {
            width: 100%;
            max-width: 720px;
            background: var(--panel);
            border-radius: 18px;
            border: var(--line-thin) solid rgba(148, 163, 184, 0.35);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.85);
            padding: 1.75rem 1.75rem 1.5rem;
        }

        .header {
            margin-bottom: 1.5rem;
        }

        .eyebrow {
            font-size: 0.75rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }

        .eyebrow-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.25), 0 0 20px rgba(52, 211, 153, 0.9);
        }

        h1 {
            font-size: 1.6rem;
            letter-spacing: -0.03em;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .controls {
            margin: 1.5rem 0 1.25rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        button {
            border-radius: 999px;
            border: var(--line-thin) solid rgba(148, 163, 184, 0.7);
            background: #020617;
            color: var(--text-main);
            padding: 0.55rem 1.05rem;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: border-color 0.16s ease-out, background-color 0.16s ease-out,
                transform 0.08s ease-out, box-shadow 0.16s ease-out, color 0.16s ease-out;
        }

        button:hover {
            border-color: var(--accent);
            background-color: #020617;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.9);
            transform: translateY(-1px);
            color: var(--accent);
        }

        button:active {
            transform: translateY(0) scale(0.97);
            box-shadow: none;
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .panel-row {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
            gap: 1.2rem;
            align-items: flex-start;
        }

        .log-panel,
        .test-panel {
            border-radius: var(--radius);
            border: var(--line-thin) solid rgba(31, 41, 55, 0.9);
            background: radial-gradient(circle at top left, rgba(15, 23, 42, 0.88), #020617);
            padding: 0.85rem 0.9rem;
        }

        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.17em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .log-lines {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.5;
            white-space: pre-wrap;
            max-height: 220px;
            overflow-y: auto;
            color: var(--text-main);
        }

        .test-list {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.5;
            color: var(--text-main);
        }

        .test-pass {
            color: #4ade80;
        }

        .test-fail {
            color: #f97373;
        }

        @media (max-width: 768px) {
            body {
                padding: 1.25rem;
            }

            .shell {
                padding: 1.4rem 1.25rem 1.25rem;
            }

            .panel-row {
                grid-template-columns: minmax(0, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <header class="header">
            <div class="eyebrow">
                <span class="eyebrow-dot"></span>
                Geolocation Bridge
            </div>
            <h1>Safe Geolocation Wrapper</h1>
            <p class="subtitle">
                Demonstrates feature detection and error handling so unsupported sandbox
                environments don't throw <code>[GeolocationBridge:init error]</code>.
            </p>
        </header>

        <section class="controls">
            <button id="btn-locate" type="button">
                <span>📍</span>
                Request Position
            </button>
            <button id="btn-clear" type="button">
                <span>🧹</span>
                Clear Log
            </button>
            <div id="status" class="status"></div>
        </section>

        <section class="panel-row">
            <div class="log-panel">
                <div class="panel-title">Runtime Log</div>
                <div id="log" class="log-lines"></div>
            </div>
            <div class="test-panel">
                <div class="panel-title">Self Tests</div>
                <div id="tests" class="test-list"></div>
            </div>
        </section>
    </div>

    <script>
        // --- Geolocation helpers -------------------------------------------------

        function supportsGeolocation() {
            // Pure feature detection; never attempts to overwrite navigator properties.
            try {
                return typeof navigator !== "undefined" && !!navigator.geolocation;
            } catch (e) {
                return false;
            }
        }

        function safeGetCurrentPosition(options) {
            // Wrap geolocation access in a Promise with proper guards.
            return new Promise((resolve, reject) => {
                if (!supportsGeolocation()) {
                    reject(new Error("Geolocation is not available in this environment."));
                    return;
                }

                try {
                    navigator.geolocation.getCurrentPosition(resolve, reject, options);
                } catch (err) {
                    // Catch any unexpected synchronous errors from the bridge.
                    reject(err instanceof Error ? err : new Error(String(err)));
                }
            });
        }

        // --- UI logging ----------------------------------------------------------

        const logEl = document.getElementById("log");
        const statusEl = document.getElementById("status");
        const testsEl = document.getElementById("tests");

        function appendLog(message) {
            const timestamp = new Date().toISOString().split("T")[1].replace("Z", "");
            logEl.textContent += `[${timestamp}] ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(message) {
            statusEl.textContent = message;
        }

        function renderTestResult(name, ok, detail) {
            const line = document.createElement("div");
            line.className = ok ? "test-pass" : "test-fail";
            const badge = ok ? "PASS" : "FAIL";
            line.textContent = `${badge}  ${name}${detail ? ` — ${detail}` : ""}`;
            testsEl.appendChild(line);
        }

        // --- Self tests ----------------------------------------------------------

        function runSelfTests() {
            testsEl.textContent = "";

            // Test 1: supportsGeolocation should always return a boolean.
            try {
                const result = supportsGeolocation();
                const ok = typeof result === "boolean";
                renderTestResult("supportsGeolocation returns boolean", ok, `value: ${result}`);
            } catch (err) {
                renderTestResult("supportsGeolocation throws", false, String(err));
            }

            // Test 2: safeGetCurrentPosition should be callable and safe even when
            // geolocation is unavailable. We temporarily stub supportsGeolocation to
            // return false so that we never touch the real bridge or APIs.
            try {
                const originalSupports = supportsGeolocation;
                let threw = false;
                let returnedPromise = false;

                // Temporary stub: force the "unavailable" branch.
                supportsGeolocation = function () {
                    return false;
                };

                let value;
                try {
                    value = safeGetCurrentPosition();
                    returnedPromise = !!value && typeof value.then === "function";
                } catch (err) {
                    threw = true;
                }

                // Attach a no-op rejection handler so the test call doesn't produce
                // unhandled promise rejections.
                if (returnedPromise) {
                    value.catch(function () {
                        appendLog("Test call (unavailable): rejection was handled safely.");
                    });
                }

                // Restore original function.
                supportsGeolocation = originalSupports;

                const ok = returnedPromise && !threw;
                renderTestResult(
                    "safeGetCurrentPosition safe when geolocation unavailable",
                    ok,
                    ok ? "returned Promise and did not throw" : "unexpected throw or non-Promise"
                );
            } catch (err) {
                renderTestResult(
                    "safeGetCurrentPosition safety test threw",
                    false,
                    String(err)
                );
            }
        }

        // --- Event wiring --------------------------------------------------------

        document.getElementById("btn-locate").addEventListener("click", function () {
            appendLog("Requesting current position via safe wrapper...");
            setStatus("Requesting position…");

            safeGetCurrentPosition({ enableHighAccuracy: false, timeout: 8000 })
                .then(function (pos) {
                    var coords = pos.coords;
                    var latitude = coords.latitude;
                    var longitude = coords.longitude;
                    var accuracy = coords.accuracy;

                    appendLog(
                        "Position received: lat=" +
                        latitude.toFixed(5) +
                        ", lon=" +
                        longitude.toFixed(5) +
                        ", accuracy≈" +
                        accuracy +
                        "m"
                    );
                    setStatus("Position received.");
                })
                .catch(function (err) {
                    appendLog(
                        "Position error: " + (err && err.message ? err.message : String(err))
                    );
                    setStatus("Unable to read position (likely unsupported or denied).");
                });
        });

        document.getElementById("btn-clear").addEventListener("click", function () {
            logEl.textContent = "";
            setStatus("");
        });

        // Initial state + tests
        setStatus(
            supportsGeolocation()
                ? "Geolocation appears to be available. You can request position."
                : "Geolocation not available in this environment. Calls are safely rejected."
        );

        appendLog("Initialized geolocation wrapper without touching readonly properties.");
        runSelfTests();
    </script>
</body>

</html>
